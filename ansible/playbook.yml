---
- name: Configure EC2 host for Minikube and Helm
  hosts: minikube
  become: true

  vars:
    kubectl_version: "v1.30.1"
    minikube_version: "v1.35.0"
    helm_version: "v3.15.4"

    target_user: ec2-user
    target_home: /home/ec2-user

    minikube_memory_mb: 2200
    minikube_cpus: 2

    api_server_port: 8443
    nodeport_range_start: 30000
    nodeport_range_end: 32767

    public_api_ip: "{{ hostvars[inventory_hostname].ansible_host | default(inventory_hostname) }}"

  pre_tasks:

  - name: Wait for SSH
    wait_for_connection:
      timeout: 300

  tasks:

  - name: Install required packages
    dnf:
      name:
        - docker
        - conntrack
        - curl
        - git
        - iproute
        - iptables
        - socat
        - tar
      state: present
      allowerasing: true

  - name: Enable and start Docker
    systemd:
      name: docker
      enabled: true
      state: started

  - name: Add ec2-user to docker group
    user:
      name: "{{ target_user }}"
      groups: docker
      append: true

  - name: Install kubectl
    get_url:
      url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
      dest: /usr/local/bin/kubectl
      mode: "0755"

  - name: Install Minikube
    get_url:
      url: "https://storage.googleapis.com/minikube/releases/{{ minikube_version }}/minikube-linux-amd64"
      dest: /usr/local/bin/minikube
      mode: "0755"

  - name: Download Helm
    get_url:
      url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
      dest: /tmp/helm.tar.gz

  - name: Extract Helm
    unarchive:
      src: /tmp/helm.tar.gz
      dest: /tmp
      remote_src: true

  - name: Install Helm
    copy:
      src: /tmp/linux-amd64/helm
      dest: /usr/local/bin/helm
      remote_src: true
      mode: "0755"

  - name: Start Minikube cluster
    become_user: "{{ target_user }}"
    shell: |
      minikube start \
      --driver=docker \
      --memory={{ minikube_memory_mb }} \
      --cpus={{ minikube_cpus }} \
      --apiserver-ips={{ public_api_ip }},127.0.0.1
    args:
      executable: /bin/bash
      chdir: "{{ target_home }}"

  - name: Install NodePort exposure script
    copy:
      dest: /usr/local/bin/minikube-expose-nodeports.sh
      mode: "0755"
      content: |
        #!/usr/bin/env bash
        START="{{ nodeport_range_start }}"
        END="{{ nodeport_range_end }}"
        CHAIN="MINIKUBE_NODEPORT"

        MK_IP="$(runuser -l {{ target_user }} -c 'minikube ip')"

        iptables -t nat -N "${CHAIN}" 2>/dev/null || true
        iptables -t nat -F "${CHAIN}"
        iptables -t nat -A "${CHAIN}" -j DNAT --to-destination "${MK_IP}"

        iptables -t nat -C PREROUTING -p tcp --dport "${START}:${END}" -j "${CHAIN}" 2>/dev/null || \
        iptables -t nat -A PREROUTING -p tcp --dport "${START}:${END}" -j "${CHAIN}"

        iptables -C FORWARD -p tcp --dport "${START}:${END}" -j ACCEPT 2>/dev/null || \
        iptables -A FORWARD -p tcp --dport "${START}:${END}" -j ACCEPT

  - name: Install NodePort systemd service
    copy:
      dest: /etc/systemd/system/minikube-nodeport-expose.service
      content: |
        [Unit]
        Description=Expose Minikube NodePort range

        [Service]
        Type=oneshot
        ExecStart=/usr/local/bin/minikube-expose-nodeports.sh
        RemainAfterExit=yes

        [Install]
        WantedBy=multi-user.target

  - name: Enable NodePort service
    systemd:
      name: minikube-nodeport-expose.service
      daemon_reload: true
      enabled: true
      state: started

  - name: Install API exposure script
    copy:
      dest: /usr/local/bin/minikube-expose-apiserver.sh
      mode: "0755"
      content: |
        #!/usr/bin/env bash
        MK_IP="$(runuser -l {{ target_user }} -c 'minikube ip')"
        exec socat TCP-LISTEN:{{ api_server_port }},fork,reuseaddr TCP:${MK_IP}:{{ api_server_port }}

  - name: Install API exposure service
    copy:
      dest: /etc/systemd/system/minikube-apiserver-expose.service
      content: |
        [Unit]
        Description=Expose Minikube API server

        [Service]
        Type=simple
        ExecStart=/usr/local/bin/minikube-expose-apiserver.sh
        Restart=always

        [Install]
        WantedBy=multi-user.target

  - name: Enable API exposure service
    systemd:
      name: minikube-apiserver-expose.service
      daemon_reload: true
      enabled: true
      state: restarted

  - name: Update kubeconfig context
    become_user: "{{ target_user }}"
    command: minikube update-context
    environment:
      CHANGE_MINIKUBE_NONE_USER: "true"
    args:
      chdir: "{{ target_home }}"

  - name: Generate public kubeconfig
    become_user: "{{ target_user }}"
    shell: |
      kubectl config view --raw --flatten --minify > "{{ target_home }}/kubeconfig-public.yaml"
    args:
      executable: /bin/bash
      chdir: "{{ target_home }}"
    environment:
      KUBECONFIG: "{{ target_home }}/.kube/config"

  - name: Replace kubeconfig server endpoint
    become_user: "{{ target_user }}"
    replace:
      path: "{{ target_home }}/kubeconfig-public.yaml"
      regexp: 'server: https://.*'
      replace: 'server: https://{{ public_api_ip }}:{{ api_server_port }}'

  - name: Ensure artifact directory
    delegate_to: localhost
    become: false
    file:
      path: "{{ playbook_dir }}/artifacts"
      state: directory
      mode: "0755"

  - name: Fetch kubeconfig
    fetch:
      src: "{{ target_home }}/kubeconfig-public.yaml"
      dest: "{{ playbook_dir }}/artifacts/kubeconfig-public-{{ inventory_hostname }}.yaml"
      flat: true

  - name: Verify cluster
    become_user: "{{ target_user }}"
    command: kubectl get nodes
    environment:
      KUBECONFIG: "{{ target_home }}/.kube/config"
