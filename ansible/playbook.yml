---
- name: Configure EC2 host for Minikube and Helm
  hosts: minikube
  become: true
  vars:
    kubectl_version: "v1.30.1"
    minikube_version: "v1.35.0"
    helm_version: "v3.15.4"
    target_user: "ec2-user"
    target_home: "/home/ec2-user"
    minikube_memory_mb: 2200
    minikube_cpus: 2
    api_server_port: 8443
    public_api_ip: "{{ hostvars[inventory_hostname].ansible_host | default(inventory_hostname) }}"

  pre_tasks:
    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        timeout: 300

  tasks:
    - name: Install OS packages required for Docker and Minikube
      ansible.builtin.dnf:
        name:
          - docker
          - conntrack
          - curl
          - git
          - iproute
          - iptables
          - socat
          - tar
        state: present
        allowerasing: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add ec2-user to docker group
      ansible.builtin.user:
        name: "{{ target_user }}"
        groups: docker
        append: true

    - name: Download kubectl
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"

    - name: Download Minikube
      ansible.builtin.get_url:
        url: "https://storage.googleapis.com/minikube/releases/{{ minikube_version }}/minikube-linux-amd64"
        dest: /usr/local/bin/minikube
        mode: "0755"

    - name: Download Helm archive
      ansible.builtin.get_url:
        url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
        dest: /tmp/helm.tar.gz
        mode: "0644"

    - name: Extract Helm archive
      ansible.builtin.unarchive:
        src: /tmp/helm.tar.gz
        dest: /tmp
        remote_src: true
        creates: /tmp/linux-amd64/helm

    - name: Install Helm binary
      ansible.builtin.copy:
        src: /tmp/linux-amd64/helm
        dest: /usr/local/bin/helm
        remote_src: true
        mode: "0755"

    - name: Start Minikube with the Docker driver and public API SAN
      become_user: "{{ target_user }}"
      ansible.builtin.shell: |
        sg docker -c 'minikube start --driver=docker --memory={{ minikube_memory_mb }} --cpus={{ minikube_cpus }} --apiserver-ips={{ public_api_ip }}'
      args:
        executable: /bin/bash
        chdir: "{{ target_home }}"

    - name: Install API proxy launcher for host port 8443
      ansible.builtin.copy:
        dest: /usr/local/bin/minikube-apiserver-proxy.sh
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          MK_IP="$(runuser -l {{ target_user }} -c 'minikube ip')"
          exec socat TCP-LISTEN:{{ api_server_port }},fork,reuseaddr TCP:${MK_IP}:{{ api_server_port }}

    - name: Install systemd service for Minikube API proxy
      ansible.builtin.copy:
        dest: /etc/systemd/system/minikube-apiserver-proxy.service
        mode: "0644"
        content: |
          [Unit]
          Description=Proxy host port {{ api_server_port }} to Minikube API server
          After=network-online.target docker.service
          Wants=network-online.target

          [Service]
          Type=simple
          ExecStart=/usr/local/bin/minikube-apiserver-proxy.sh
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and restart Minikube API proxy service
      ansible.builtin.systemd:
        name: minikube-apiserver-proxy.service
        daemon_reload: true
        enabled: true
        state: restarted

    - name: Update kubeconfig server endpoint to public IP
      become_user: "{{ target_user }}"
      ansible.builtin.replace:
        path: "{{ target_home }}/.kube/config"
        regexp: '(^\s*server:\s*)https://.*$'
        replace: '\1https://{{ public_api_ip }}:{{ api_server_port }}'

    - name: Generate portable kubeconfig for remote deployments
      become_user: "{{ target_user }}"
      ansible.builtin.shell: |
        kubectl config view --raw --flatten --minify > "{{ target_home }}/kubeconfig-public.yaml"
      args:
        executable: /bin/bash
        chdir: "{{ target_home }}"
      environment:
        KUBECONFIG: "{{ target_home }}/.kube/config"

    - name: Ensure kubeconfig artifact directory exists on controller
      delegate_to: localhost
      become: false
      ansible.builtin.file:
        path: "{{ playbook_dir }}/artifacts"
        state: directory
        mode: "0755"

    - name: Fetch generated kubeconfig to controller
      become: false
      ansible.builtin.fetch:
        src: "{{ target_home }}/kubeconfig-public.yaml"
        dest: "{{ playbook_dir }}/artifacts/kubeconfig-{{ inventory_hostname }}.yaml"
        flat: true

    - name: Verify kubectl can reach the cluster
      become_user: "{{ target_user }}"
      ansible.builtin.command: kubectl get nodes
      environment:
        KUBECONFIG: "{{ target_home }}/.kube/config"
